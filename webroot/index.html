<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6750A4" />
  <title>Carrier IMS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topappbar">
    <div class="appbar-inner">
      <span class="appbar-title">Carrier IMS</span>
      <span class="appbar-version" id="version"></span>
    </div>
  </header>

  <main class="content">
    <!-- Slot tabs -->
    <nav class="segmented" id="slotTabs"></nav>

    <!-- Feature list -->
    <section class="card" id="featureCard">
      <ul class="setting-list" id="featureList"></ul>
    </section>

    <!-- Apply -->
    <button class="btn-filled" id="applyBtn">应用</button>
    <p class="apply-result" id="applyResult"></p>

    <!-- Status -->
    <section class="card">
      <div class="card-head">
        <h2>状态</h2>
        <button class="btn-text" id="refreshBtn">刷新</button>
      </div>
      <div id="statusView" class="status-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
