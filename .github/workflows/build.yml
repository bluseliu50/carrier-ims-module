name: Build & Verify Module

# Packs the module zip (no compilation needed — pure shell scripts) and
# verifies the zip structure. On version tags (v*) a GitHub Release is created.
on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack module zip
        run: |
          VERSION=$(grep -m1 '^version=' module.prop | cut -d= -f2 | tr -d ' \r')
          OUT="../carrier-ims-${VERSION}.zip"
          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/bin" "$STAGE/webroot"
          cp -f module.prop customize.sh service.sh uninstall.sh update.json "$STAGE"/
          cp -f bin/*.sh "$STAGE/bin/"
          cp -f webroot/index.html webroot/app.js webroot/style.css "$STAGE/webroot/"
          (cd "$STAGE" && zip -qr "$OLDPWD/$OUT" .)
          rm -rf "$STAGE"
          echo "✓ Built $OUT"

      - name: Verify module zip structure
        run: |
          VERSION=$(grep -m1 '^version=' module.prop | cut -d= -f2 | tr -d ' \r')
          ZIP="../carrier-ims-${VERSION}.zip"
          test -f "$ZIP" || { echo "!! zip not produced"; exit 1; }
          echo "--- zip listing ---"
          unzip -l "$ZIP"
          for f in \
            module.prop \
            update.json \
            customize.sh \
            service.sh \
            uninstall.sh \
            bin/apply.sh \
            bin/cc-apply.sh \
            bin/status.sh \
            bin/read-config.sh \
            webroot/index.html \
            webroot/app.js \
            webroot/style.css; do
            unzip -l "$ZIP" "$f" | grep -q "$f" || { echo "!! missing in zip: $f"; exit 1; }
          done
          unzip -p "$ZIP" module.prop | grep -Eq '^id=[a-zA-Z][a-zA-Z0-9._-]+$' || { echo "!! module.prop id invalid"; exit 1; }
          unzip -p "$ZIP" module.prop | grep -q '^versionCode=' || { echo "!! module.prop versionCode missing"; exit 1; }
          echo "✓ module zip structure verified"

      - name: Parse version
        id: ver
        run: |
          VERSION=$(grep -m1 '^version=' module.prop | cut -d= -f2 | tr -d ' \r')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mv "../carrier-ims-${VERSION}.zip" "carrier-ims-${VERSION}.zip"

      - name: Upload module zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: carrier-ims-${{ steps.ver.outputs.version }}-module
          path: carrier-ims-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: carrier-ims-${{ steps.ver.outputs.version }}.zip
