name: Build & Verify Module

# Compiles the app_process applier (Java→dex) then packs the module zip.
# On version tags (v*) a GitHub Release is created.
on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Compile applier to dex
        run: |
          ANDROID_HOME="${ANDROID_HOME:-${ANDROID_SDK_ROOT}}"
          PLATFORM_JAR="$ANDROID_HOME/platforms/android-36/android.jar"
          D8="$(ls -d "$ANDROID_HOME"/build-tools/*/d8 | head -1)"
          test -f "$PLATFORM_JAR" || { echo "!! android.jar missing"; exit 1; }
          test -f "$D8" || { echo "!! d8 missing"; exit 1; }
          rm -rf build && mkdir -p build/classes system/bin
          javac --release 11 -cp "$PLATFORM_JAR" -d build/classes applier/src/Applier.java
          "$D8" --min-api 33 --output system/bin build/classes/Applier.class
          mv -f system/bin/classes.dex system/bin/Applier.dex
          echo "✓ Compiled Applier.dex"

      - name: Pack module zip
        run: |
          VERSION=$(grep -m1 '^version=' module.prop | cut -d= -f2 | tr -d ' \r')
          OUT="../carrier-ims-${VERSION}.zip"
          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/system/bin" "$STAGE/bin" "$STAGE/webroot"
          cp -f module.prop customize.sh service.sh uninstall.sh update.json "$STAGE"/
          cp -f bin/*.sh "$STAGE/bin/"
          cp -f webroot/index.html webroot/app.js webroot/style.css "$STAGE/webroot/"
          cp -f system/bin/Applier.dex "$STAGE/system/bin/"
          (cd "$STAGE" && zip -qr "$OLDPWD/$OUT" .)
          rm -rf "$STAGE"
          echo "✓ Built $OUT"

      - name: Verify module zip structure
        run: |
          VERSION=$(grep -m1 '^version=' module.prop | cut -d= -f2 | tr -d ' \r')
          ZIP="../carrier-ims-${VERSION}.zip"
          test -f "$ZIP" || { echo "!! zip not produced"; exit 1; }
          echo "--- zip listing ---"
          unzip -l "$ZIP"
          for f in \
            module.prop \
            update.json \
            customize.sh \
            service.sh \
            uninstall.sh \
            bin/apply.sh \
            bin/apply-root.sh \
            bin/status.sh \
            bin/read-config.sh \
            system/bin/Applier.dex \
            webroot/index.html \
            webroot/app.js \
            webroot/style.css; do
            unzip -l "$ZIP" "$f" | grep -q "$f" || { echo "!! missing in zip: $f"; exit 1; }
          done
          echo "✓ module zip structure verified"

      - name: Parse version
        id: ver
        run: |
          VERSION=$(grep -m1 '^version=' module.prop | cut -d= -f2 | tr -d ' \r')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mv "../carrier-ims-${VERSION}.zip" "carrier-ims-${VERSION}.zip"

      - name: Upload module zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: carrier-ims-${{ steps.ver.outputs.version }}-module
          path: carrier-ims-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: carrier-ims-${{ steps.ver.outputs.version }}.zip
